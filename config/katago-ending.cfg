# KataGo config for gtp2ogs' ending_bot safety check.
#
# The main bot samples from the human SL policy and does not resign. gtp2ogs
# consults this normal KataGo bot late in the game; if it says pass, gtp2ogs
# passes instead of playing a human-policy cleanup move, and if it says resign
# repeatedly, gtp2ogs resigns.

logDir = gtp_logs
logAllGTPCommunication = true
logSearchInfo = true
logSearchInfoForChosenMove = false
logToStderr = false

rules = japanese
conservativePass = true

allowResignation = true
resignThreshold = -0.90
resignConsecTurns = 1
resignMinScoreDifference = 25
resignMinMovesPerBoardArea = 0.30

maxVisits = 500
numSearchThreads = 8

nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16

rootNumSymmetriesToSample = 1
useLcbForSelection = false
useUncertainty = false
subtreeValueBiasFactor = 0.0
useNoisePruning = false
