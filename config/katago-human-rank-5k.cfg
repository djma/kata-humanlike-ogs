# KataGo GTP config approximating KaTrain's "Human-like AI" play at modern 5k.
#
# KaTrain does not use GTP move generation for this mode. It runs KataGo in
# analysis mode with:
#   -model <regular kata model>
#   -human-model <b18c384nbt-humanv0.bin.gz>
# and, for each move, requests humanPolicy with overrideSettings:
#   humanSLProfile = rank_5k
#   ignorePreRootHistory = false
#
# KaTrain then samples directly from humanPolicy in the GUI. A standalone GTP
# config cannot reproduce that Python-side sampling exactly, but these settings
# keep KataGo's GTP move choice as close as possible to raw KaTrain behavior.

logDir = gtp_logs
logAllGTPCommunication = true
logSearchInfo = true
logSearchInfoForChosenMove = false
logToStderr = false

rules = japanese
conservativePass = true

# KaTrain's human-like play does not resign; it always samples and plays a move.
allowResignation = false
resignThreshold = -0.99
resignConsecTurns = 20
resignMinScoreDifference = 40
resignMinMovesPerBoardArea = 0.4

# The final move is sampled from the human SL policy. Keep search to the
# minimum needed for KataGo GTP plumbing; the ending_bot handles pass/resign.
maxVisits = 1

# KaTrain's packaged analysis_config.cfg uses numSearchThreads = 8.
numSearchThreads = 8

# KaTrain's engine config has max_time = 8.0, but human-like move generation
# calls request_analysis without a time limit, so this config also omits maxTime.

# KaTrain 5k + modern_style=true maps to rank_5k.
humanSLProfile = rank_5k
ignorePreRootHistory = false
analysisIgnorePreRootHistory = false

# Use the human model for final GTP move selection. Keep PIKL lambda huge so
# KataGo utility has effectively no impact, matching KaTrain's raw humanPolicy
# sampling rather than strength-adjusted play.
humanSLChosenMoveProp = 1.0
humanSLChosenMoveIgnorePass = false
humanSLChosenMovePiklLambda = 100000000

# Full temperature means proportional sampling from the human-policy-shaped
# move distribution, matching KaTrain's weighted random choice.
chosenMoveTemperatureEarly = 1.0
chosenMoveTemperature = 1.0
chosenMoveTemperatureHalflife = 19
chosenMoveTemperatureOnlyBelowProb = 1.0
chosenMoveSubtract = 0
chosenMovePrune = 0

# Match KaTrain's packaged analysis_config cache settings.
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16

# KaTrain does not set these human-search or GTP strength-tuning options for
# human-like move generation, so leave them at neutral/default-equivalent values.
humanSLRootExploreProbWeightless = 0.0
humanSLRootExploreProbWeightful = 0.0
humanSLPlaExploreProbWeightless = 0.0
humanSLPlaExploreProbWeightful = 0.0
humanSLOppExploreProbWeightless = 0.0
humanSLOppExploreProbWeightful = 0.0

rootNumSymmetriesToSample = 1
useLcbForSelection = false

# Match KataGo's normal GTP defaults shown in KaTrain's analysis_config comments.
winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 0.10
dynamicScoreUtilityFactor = 0.30

useUncertainty = false
subtreeValueBiasFactor = 0.0
useNoisePruning = false
